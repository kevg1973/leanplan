<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Kettlebell -->
  <g transform="translate(20,20)">
    <defs>
      <linearGradient id="kb" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#F5F7FA"/>
        <stop offset="100%" stop-color="#DDE2E8"/>
      </linearGradient>
      <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#6FAEFF"/>
        <stop offset="100%" stop-color="#3A8DFF"/>
      </linearGradient>
    </defs>

    <!-- Body -->
    <circle cx="70" cy="90" r="60" fill="url(#kb)" stroke="#CCD2D9" stroke-width="2"/>

    <!-- Handle -->
    <rect x="30" y="10" width="80" height="30" rx="15" fill="url(#kb)" stroke="#CCD2D9" stroke-width="2"/>

    <!-- L -->
    <path d="M60 60 L60 120 L100 110" fill="none" stroke="url(#blue)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="180" y="115" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#111318">
    Lean
  </text>
  <text x="340" y="115" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#3A8DFF">
    Plan
  </text>
</svg>